name: etc/kurucz
type: stellar
title: The 1993 Kurucz Stellar Atmospheres Atlas ESO ETC version
abstract: Subset of Kurucz Stellar Atmospheres Atlas used in the ESO ETC.
# Note: Unlike some of the other "subsets" previously stored here, this one
#       actually contains some spectra NOT included in the other "kurucz"
#       library, thus not really a subset and kept here.

